<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set New Password | EduVision</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; font-family: 'Inter', sans-serif; }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="flex items-center justify-center h-screen p-4">
    <div class="glass-card w-full max-w-md p-8 rounded-3xl shadow-2xl">
        <h1 class="text-2xl font-bold text-white mb-6 text-center">New Password</h1>
        <form method="POST" class="space-y-6">
            <div>
                <label class="block text-xs font-bold text-gray-500 uppercase tracking-widest mb-2">New Password</label>
                <input type="password" name="password" required class="w-full px-4 py-3.5 rounded-xl border border-white/10 bg-black/40 text-white outline-none focus:border-emerald-500" placeholder="••••••••">
            </div>
            <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-4 rounded-xl">Update Password</button>
        </form>
    </div>
</body>
</html>
