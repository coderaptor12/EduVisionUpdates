<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | EduVision AI Lab</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #0f172a; background-image: radial-gradient(at 0% 0%, rgba(16, 185, 129, 0.05) 0px, transparent 50%); font-family: 'Inter', sans-serif; }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="flex items-center justify-center h-screen p-4">
    <div class="glass-card w-full max-w-md p-8 rounded-3xl shadow-2xl">
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-14 h-14 bg-emerald-500/10 rounded-2xl mb-4">
                <i class="fa-solid fa-key text-2xl text-emerald-500"></i>
            </div>
            <h1 class="text-2xl font-bold text-white">Forgot Password?</h1>
            <p class="text-gray-400 mt-2 text-sm">Enter your registered email and we'll send a reset link.</p>
        </div>

        <form action="/forgot_password" method="POST" class="space-y-6">
            <div>
                <label class="block text-xs font-bold text-gray-500 uppercase tracking-widest mb-2 ml-1">Email Address</label>
                <input type="email" name="email" required class="w-full px-4 py-3.5 rounded-xl border border-white/10 bg-black/40 text-white outline-none focus:border-emerald-500" placeholder="your@email.com">
            </div>
            <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-4 rounded-xl shadow-lg transition-all active:scale-[0.98]">Send Reset Link</button>
        </form>

        <div class="mt-8 text-center pt-6">
            <a href="/login" class="text-emerald-500 hover:text-emerald-400 font-bold text-sm"><i class="fa-solid fa-arrow-left mr-2"></i>Back to Login</a>
        </div>
    </div>
</body>
</html>
