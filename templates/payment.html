<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Checkout | EduVision</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #080808; color: #d1d5db; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">

    <div class="max-w-md w-full glass p-10 rounded-[40px] text-center border-emerald-500/20 shadow-2xl">
        <h1 class="text-4xl font-black text-white italic uppercase tracking-tighter mb-2">Checkout</h1>
        <p class="text-zinc-500 text-xs font-bold uppercase tracking-widest mb-8">Scan QR to pay into EduVision Lab</p>

        <!-- QR CODE CONTAINER -->
        <div class="bg-white p-6 rounded-[30px] inline-block mb-8 shadow-xl">
            <img id="qr-image" src="" alt="UPI QR Code" class="w-48 h-48">
        </div>

        <div class="space-y-4 mb-10">
            <div class="flex justify-between items-center px-4">
                <span class="text-[10px] font-black uppercase text-zinc-500">Amount to Pay</span>
                <span id="display-amount" class="text-2xl font-black text-emerald-500">₹0</span>
            </div>
            <div class="h-px bg-white/5"></div>
            <p class="text-[9px] font-bold text-zinc-600 uppercase tracking-[2px]">Supports PhonePe, GPay, Paytm, Any UPI</p>
        </div>

        <button onclick="verifyPayment()" id="verify-btn" class="w-full bg-emerald-600 text-white py-5 rounded-2xl font-black uppercase text-xs tracking-widest hover:bg-emerald-500 transition-all">
            I Have Paid - Verify Now
        </button>
        
        <a href="/#subscription" class="block mt-6 text-[10px] font-black text-zinc-500 uppercase hover:text-white transition">Cancel and Return</a>
    </div>

    <script>
        // 1. CHANGE THIS TO YOUR ACTUAL UPI ID
        const MY_UPI_ID = "9730522475@ibl"; // Replace with your real UPI ID (e.g., yourname@okicici)
        const MY_NAME = "EduVision Lab";

        // Get amount from URL
        const urlParams = new URLSearchParams(window.location.search);
        const amount = urlParams.get('amount') || 149;
        
        document.getElementById('display-amount').innerText = `₹${amount}`;

        // 2. GENERATE THE REAL UPI LINK
        // Format: upi://pay?pa=VPA&pn=NAME&am=AMOUNT&cu=INR
        const upiLink = `upi://pay?pa=${MY_UPI_ID}&pn=${encodeURIComponent(MY_NAME)}&am=${amount}&cu=INR`;
        
        // 3. SET THE QR CODE IMAGE
        const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${encodeURIComponent(upiLink)}`;
        document.getElementById('qr-image').src = qrUrl;

        async function verifyPayment() {
            const btn = document.getElementById('verify-btn');
            btn.innerText = "VERIFYING WITH BANK...";
            btn.disabled = true;

            // Simulate a check (In a real app, you check your bank notifications)
            setTimeout(async () => {
                const res = await fetch('/api/payment/verify', { method: 'POST' });
                if(res.ok) {
                    alert("Payment Verified! Your account is now upgraded.");
                    window.location.href = "/";
                }
            }, 3000);
        }
    </script>
</body>
</html>
