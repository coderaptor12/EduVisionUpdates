<!DOCTYPE html>
<html>
<head>
  <title>History</title>
  <style>
    body { font-family: Arial; background: #f4f6ff; padding: 20px; }
    .card {
      background: white;
      padding: 15px;
      border-radius: 15px;
      margin-bottom: 20px;
      box-shadow: 0px 4px 12px rgba(0,0,0,0.1);
    }
    img { max-width: 300px; border-radius: 12px; margin-top: 10px; }
    audio { margin-top: 10px; width: 100%; }
    pre { white-space: pre-wrap; background: #f8f8ff; padding: 10px; border-radius: 10px; }
  </style>
</head>

<body>
  <h1>📜 EduVision History</h1>

  {% for r in records %}
  <div class="card">
    <h2>{{ r.topic }}</h2>
    <p><b>Level:</b> {{ r.level }}</p>
    <p><b>Date:</b> {{ r.created_at }}</p>

    <pre>{{ r.explanation }}</pre>

    {% if r.image_url %}
      <img src="{{ r.image_url }}">
    {% endif %}

    {% if r.audio_url %}
      <audio controls>
        <source src="{{ r.audio_url }}" type="audio/mpeg">
      </audio>
    {% endif %}
  </div>
  {% endfor %}

  <a href="/">⬅ Back</a>
</body>
</html>
